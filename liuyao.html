<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知时 · 六爻占卜</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.liuyao-page{max-width:600px;margin:80px auto 40px;padding:0 20px;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-title{text-align:center;font-size:24px;color:var(--gold-l);letter-spacing:6px;margin-bottom:6px}
.page-sub{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:32px;letter-spacing:2px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
.card h3{font-size:14px;color:var(--gold-l);letter-spacing:3px;margin-bottom:16px;text-align:center}
.btn-submit{display:block;margin:20px auto 0;padding:14px 40px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none;border-radius:25px;cursor:pointer;letter-spacing:2px;font-family:inherit}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(201,168,76,.2)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.coin-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.coin-row .label{width:80px;font-size:12px;color:var(--tx3);text-align:right}
.coin-row .result{flex:1;font-size:16px;color:var(--tx);font-family:monospace;letter-spacing:3px}
.coin-row .yao-type{font-size:11px;color:var(--gold-l);min-width:60px}
/* 铜钱动画 */
.coin-stage{display:flex;justify-content:center;gap:28px;padding:20px 0}
.coin{width:56px;height:56px;border-radius:50%;position:relative;cursor:default}
.coin .face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;backface-visibility:hidden;
  background:linear-gradient(135deg,#a08050,#d4b868,#8a6d28);border:2px solid rgba(180,140,60,.5);
  box-shadow:inset 0 0 16px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.5)}
.coin .back{transform:rotateY(180deg)}
.coin.flip{animation:coinFlip .6s ease-out}
@keyframes coinFlip{0%{transform:rotateY(0)}30%{transform:rotateY(1800deg)}60%{transform:rotateY(3600deg)}100%{transform:rotateY(4320deg)}}
.coin.tails .face{background:linear-gradient(135deg,#6a6050,#8a8068,#5a5040)}
.coin-result{text-align:center;font-size:13px;color:var(--gold-l);margin-top:8px;min-height:24px;letter-spacing:2px}
.hexagram{text-align:center;padding:20px 0}
.hexagram .gua-name{font-size:28px;color:var(--gold-l);font-weight:900;letter-spacing:6px;margin-bottom:4px}
.hexagram .gua-yao{font-size:24px;color:var(--tx2);font-family:monospace;line-height:1.8;margin:8px 0}
.loading{text-align:center;padding:40px;color:var(--tx3)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result-text{font-size:14px;color:var(--tx);line-height:2.2;padding:8px 0}
/* 全屏卦象特效 */
.gua-reveal{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s}
.gua-reveal.fadeOut{animation:fadeOut .8s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}
.gua-reveal .reveal-yao{font-size:36px;opacity:0;animation:revealLine .5s forwards;transition:text-shadow .3s}
@keyframes revealLine{from{opacity:0;transform:scale(.5);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
.gua-reveal .reveal-yao:nth-child(1){animation-delay:.1s}
.gua-reveal .reveal-yao:nth-child(2){animation-delay:.3s}
.gua-reveal .reveal-yao:nth-child(3){animation-delay:.5s}
.gua-reveal .reveal-yao:nth-child(4){animation-delay:.7s}
.gua-reveal .reveal-yao:nth-child(5){animation-delay:.9s}
.gua-reveal .reveal-yao:nth-child(6){animation-delay:1.1s}
.gua-reveal .reveal-name{font-size:32px;color:var(--gold-l);font-weight:900;letter-spacing:8px;opacity:0;animation:revealLine .5s 1.4s forwards;margin-top:16px}
.gua-reveal .reveal-sub{font-size:12px;color:var(--tx3);letter-spacing:4px;opacity:0;animation:revealLine .5s 1.7s forwards;margin-top:8px}
.gua-reveal .particles{position:absolute;inset:0;pointer-events:none}
.gua-reveal .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;animation:float 2s ease-out forwards}
@keyframes float{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
</style>
</head>
<body>
<div class="liuyao-page">
  <div class="page-title">六爻占卜</div>
  <div class="page-sub">诚心默念所问之事 · 掷钱六次以成卦</div>

  <div class="card" id="tossCard">
    <h3>第 <span id="tossNum">1</span> / 6 次掷钱</h3>
    <div class="coin-stage" id="coinStage">
      <div class="coin" id="c0"><div class="face">—</div><div class="face back">- -</div></div>
      <div class="coin" id="c1"><div class="face">—</div><div class="face back">- -</div></div>
      <div class="coin" id="c2"><div class="face">—</div><div class="face back">- -</div></div>
    </div>
    <div class="coin-result" id="coinResult"></div>
    <input type="text" id="question" placeholder="心中默念所问之事..." style="width:100%;padding:12px 16px;font-size:14px;font-family:inherit;background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:10px;color:var(--tx);outline:none;margin-bottom:12px">
    <button class="btn-submit" onclick="doToss()" id="tossBtn">摇卦</button>
    <div id="tossLog"></div>
  </div>

  <div id="result"></div>
</div>

<script src="js/liuyao-core.js"></script>
<script src="js/yijing-db.js"></script>
<script src="js/auth.js"></script>
<script>
var TG=['乾','兑','离','震','巽','坎','艮','坤'];
var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var tossCount=0, lines=[], lineTypes=[];

function yaoStr(y){ return y.map(function(v){ return v===1?'━━━':'━ ━'; }).join('<br>'); }

function doToss(){
  var question=document.getElementById('question').value.trim();
  if(!question){ alert('请先默念所问之事'); return; }
  if(tossCount>=6) return;

  var btn=document.getElementById('tossBtn'); btn.disabled=true; btn.textContent='掷钱中...';

  // 启动三枚铜钱翻转动画
  for(var i=0;i<3;i++){ var c=document.getElementById('c'+i); c.classList.remove('flip'); c.classList.remove('tails'); void c.offsetWidth; c.classList.add('flip'); }

  // 等动画结束揭晓结果
  setTimeout(function(){
    var coins=[];
    for(var i=0;i<3;i++) coins.push(Math.random()<0.5?1:0);
    var heads=coins.filter(function(c){ return c===1; }).length;
    var type,yang,changing,label;
    if(heads===3){ type='老阳 ○'; yang=true; changing=true; label='三正为阳，极则变阴'; }
    else if(heads===2){ type='少阴 ⚋'; yang=false; changing=false; label='一负二正，阴爻安静'; }
    else if(heads===1){ type='少阳 ⚊'; yang=true; changing=false; label='一正二负，阳爻安静'; }
    else { type='老阴 ×'; yang=false; changing=true; label='三负为阴，极则变阳'; }

    for(var i=0;i<3;i++){
      var c=document.getElementById('c'+i);
      c.classList.remove('flip');
      if(!coins[i]) c.classList.add('tails');
    }
    document.getElementById('coinResult').textContent=label+' — '+type;

    lines.push(yang?1:0);
    lineTypes.push({yang:yang,changing:changing,type:type});
    tossCount++;

    var log=document.getElementById('tossLog');
    log.innerHTML+='<div class="coin-row"><span class="label">第'+tossCount+'爻</span><span class="result">'+(yang?'━━━':'━ ━')+(changing?' ◯':'')+'</span><span class="yao-type">'+type+'</span></div>';

    if(tossCount<6){
      document.getElementById('tossNum').textContent=tossCount+1;
      btn.textContent='摇卦（'+tossCount+'/6）';
      btn.disabled=false;
    } else {
      btn.textContent='卦已成';
      doAnalyze();
    }
  },700);
}

function findGua(name){ return YIJING.find(function(g){ return g.name===name; }); }

function showGuaReveal(gName,lines,callback){
  var overlay=document.createElement('div'); overlay.className='gua-reveal';
  var yaoHTML=''; for(var i=0;i<6;i++) yaoHTML+='<div class="reveal-yao" style="color:'+(lines[i]?'var(--gold-l)':'var(--tx2)')+'">'+(lines[i]?'━━━━━':'━   ━')+'</div>';
  overlay.innerHTML='<canvas class="particles" id="pCanvas"></canvas>'+yaoHTML+'<div class="reveal-name">'+gName+'</div><div class="reveal-sub">卦 象 已 显</div>';
  document.body.appendChild(overlay);
  // 粒子效果
  setTimeout(function(){
    var c=document.getElementById('pCanvas'); if(!c) return;
    c.width=window.innerWidth; c.height=window.innerHeight;
    var ctx=c.getContext('2d'),particles=[];
    for(var i=0;i<30;i++) particles.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,a:1});
    function draw(){ctx.clearRect(0,0,c.width,c.height);for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.a-=.005;if(p.a<=0){p.x=Math.random()*c.width;p.y=Math.random()*c.height;p.a=1}ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,'+p.a+')';ctx.fill()}if(overlay.parentNode)requestAnimationFrame(draw)}
    draw();
  },100);
  setTimeout(function(){ overlay.classList.add('fadeOut'); setTimeout(function(){ overlay.remove(); if(callback)callback(); },800); },4200);
}

function doAnalyze(){
  try{
  var res=document.getElementById('result');
  res.innerHTML='<div class="loading"><div class="spinner"></div><p>正在装卦...</p></div>';

  if(typeof LIUYAO==='undefined'){ res.innerHTML='<div class="empty"><p>引擎未加载</p></div>'; return; }
  if(typeof YIJING==='undefined'){ res.innerHTML='<div class="empty"><p>数据库未加载</p></div>'; return; }

  var today=new Date();
  var dayGanIdx=(today.getFullYear()-4)%10;
  var monthZhi=DZ[(today.getMonth()+1)%12]||'子';

  try{
  var zg=LIUYAO.zhuangGua(lines, dayGanIdx, monthZhi);
  }catch(e){ res.innerHTML='<div class="empty"><p>装卦出错：'+e.message+'</p></div>'; return; }

  // 变卦
  var movingLines=[], chgLines=lines.slice();
  lineTypes.forEach(function(lt,i){ if(lt.changing){ movingLines.push(i+1); chgLines[i]=chgLines[i]===0?1:0; } });
  var chgZg=movingLines.length?LIUYAO.zhuangGua(chgLines, dayGanIdx, monthZhi):null;

  var origDB=findGua(zg.guaName), chgDB=chgZg?findGua(chgZg.guaName):null;

  // 干支表头
  var TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  var nY=today.getFullYear(), nM=today.getMonth()+1, nD=today.getDate();
  var yGIdx=(nY-4)%10, yZIdx=(nY-4)%12;
  var mGIdx=(yGIdx*2+nM)%10, mZIdx=nM%12;
  var dGIdx=zg.yaoGan?0:0; // 日干从装卦引擎的日干参数来
  var hDZ=zg.monthZhi; // 时辰用月建参考
  var yearGZ=TG[yGIdx]+DZ[yZIdx], monthGZ=TG[mGIdx%10]+DZ[mZIdx];

  var header='<div style="background:rgba(13,21,37,.6);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:12px;font-size:12px;line-height:2;color:var(--tx2)">';
  header+='<b style="color:var(--gold-l)">'+zg.guaName+'</b> → <b style="color:var(--gold-l)">'+(chgZg?chgZg.guaName:'静卦')+'</b>';
  header+=' &nbsp;|&nbsp; '+zg.gong+'宫 · 属'+zg.gongWX+' · '+zg.guaType;
  header+='<br>月建：'+zg.monthZhi+'月（'+zg.monthWX+'）&nbsp;|&nbsp; 世爻：第'+zg.shiYao+'爻 &nbsp;|&nbsp; 应爻：第'+zg.yingYao+'爻</div>';

  // 装卦表：左半=本卦，右半=变卦
  var table='<table style="width:100%;border-collapse:collapse;font-size:11px;background:rgba(13,21,37,.6);border:1px solid var(--bd);border-radius:10px;overflow:hidden">';
  table+='<tr style="color:var(--gold-l);font-size:10px;letter-spacing:1px;background:rgba(201,168,76,.05)"><td>六神</td><td>六亲</td><td>干支</td><td>五行</td><td>旺</td><td>长</td><td style="text-align:center">本卦</td><td style="text-align:center">变卦</td><td>六亲</td><td>干支</td><td>五行</td><td>旺</td></tr>';
  for(var i=5;i>=0;i--){
    table+='<tr style="border-bottom:1px solid rgba(255,255,255,.02)">';
    table+='<td style="color:var(--tx3);font-size:9px;padding:3px 2px">'+zg.liushen[i]+'</td>';
    table+='<td style="padding:3px 2px">'+zg.liuqin[i]+'</td>';
    table+='<td style="padding:3px 2px">'+zg.yaoGan[i]+zg.yaoDZ[i]+'</td>';
    var wxCol={'木':'#6db86d','火':'#e07050','土':'#c9a84c','金':'#e8d5a3','水':'#5b9fd4'};
    table+='<td style="padding:3px 2px;color:'+(wxCol[zg.yaoWX[i]]||'#fff')+'">'+zg.yaoWX[i]+'</td>';
    table+='<td style="padding:3px 2px;font-size:10px">'+(zg.wangShuai?zg.wangShuai[i]:'')+'</td>';
    table+='<td style="padding:3px 2px;font-size:10px;color:var(--tx3)">'+(zg.changSheng?zg.changSheng[i]:'')+'</td>';
    var mvMark='',mvColor=''; if(movingLines.indexOf(i+1)>=0){mvMark=' ◯';mvColor='color:#e8a040;font-weight:700';}
    var shiMark='',yingMark=''; if(i+1===zg.shiYao) shiMark=' <span style="font-size:7px;color:var(--gold-l)">世</span>'; if(i+1===zg.yingYao) yingMark=' <span style="font-size:7px;color:#5b9fd4">应</span>';
    table+='<td style="padding:3px 2px;font-family:monospace;font-size:14px;'+mvColor+'">'+(lines[i]?'━━━━':'━  ━')+mvMark+shiMark+yingMark+'</td>';
    // 变卦
    var chgYao=chgZg?(chgLines[i]?'━━━━':'━  ━'):'';
    table+='<td style="padding:3px 2px;font-family:monospace;font-size:12px;color:'+(chgLines[i]!==lines[i]?'var(--gold-l)':'var(--tx3)')+'">'+chgYao+'</td>';
    table+='<td style="padding:3px 2px;color:var(--tx2)">'+(chgZg?chgZg.liuqin[i]:'')+'</td>';
    table+='<td style="padding:3px 2px;color:var(--tx2)">'+(chgZg?chgZg.yaoGan[i]+chgZg.yaoDZ[i]:'')+'</td>';
    table+='<td style="padding:3px 2px;color:'+(chgZg?wxCol[chgZg.yaoWX[i]]||'var(--tx2)':'var(--tx2)')+'">'+(chgZg?chgZg.yaoWX[i]:'')+'</td>';
    table+='<td style="padding:3px 2px;font-size:10px;color:var(--tx2)">'+(chgZg?chgZg.wangShuai[i]:'')+'</td>';
    table+='</tr>';
  }
  table+='</table>';

  // 飞伏神：检查缺失的六亲
  var allQin=['父母','兄弟','妻财','官鬼','子孙'];
  var missing=[];
  allQin.forEach(function(q){ if(zg.liuqin.indexOf(q)<0) missing.push(q); });
  var fushen='';
  if(missing.length){
    fushen='<div style="margin-top:10px;background:rgba(13,21,37,.6);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:11px;color:var(--tx2);line-height:2"><b style="color:var(--gold-l)">飞伏神 · 用神/六亲不上卦</b><br>';
    missing.forEach(function(q){
      var findInChg=chgZg?chgZg.liuqin.indexOf(q)>=0:false;
      fushen+='<span style="color:#e8a040">'+q+'</span>不现于本卦'+(findInChg?'，变卦中出现':'')+'；';
    });
    fushen+='</div>';
  }

  // 动爻化象
  var dongHua='';
  if(movingLines.length){
    dongHua='<div style="margin-top:10px;background:rgba(13,21,37,.6);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:11px;color:var(--tx2);line-height:2"><b style="color:var(--gold-l)">动爻化象</b><br>';
    movingLines.forEach(function(ml){
      var o=zg.liuqin[ml-1]+zg.yaoGan[ml-1]+zg.yaoDZ[ml-1];
      var c=chgZg?chgZg.liuqin[ml-1]+chgZg.yaoGan[ml-1]+chgZg.yaoDZ[ml-1]:'?';
      var hua='';
      if(zg.yaoWX[ml-1]===chgZg.yaoWX[ml-1]) hua='比和';
      else{ var s={'木':'火','火':'土','土':'金','金':'水','水':'木'}; if(s[zg.yaoWX[ml-1]]===chgZg.yaoWX[ml-1]) hua='化泄气'; else if(s[chgZg.yaoWX[ml-1]]===zg.yaoWX[ml-1]) hua='化回头生'; else hua='化回头克'; }
      dongHua+='第'+ml+'爻&nbsp;'+o+' → '+c+'&nbsp;<span style="color:var(--gold-l)">'+hua+'</span><br>';
    });
    dongHua+='</div>';
  }

  try{
  // (rendering done below)
  }catch(e){ res.innerHTML='<div class="empty"><p>渲染出错：'+e.message+'</p></div>'; return; }
  // 神煞
  var dayGan=TG[(today.getFullYear()-4)%10]; // 日干
  var t=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  var base=new Date(1900,0,1); var days=Math.round((t-base)/86400000);
  var idx=((10+days)%60+60)%60; var dayG=DZ[idx%10],dayZ=DZ[idx%12]; // 日干支
  var yima={申子辰:'寅',寅午戌:'申',亥卯未:'巳',巳酉丑:'亥'};
  var taohua={申子辰:'酉',寅午戌:'卯',亥卯未:'子',巳酉丑:'午'};
  var ganlu={甲:'寅',乙:'卯',丙:'巳',丁:'午',戊:'巳',己:'午',庚:'申',辛:'酉',壬:'亥',癸:'子'};
  var guiren={甲:'丑未',乙:'子申',丙:'亥酉',丁:'亥酉',戊:'丑未',己:'子申',庚:'丑未',辛:'午寅',壬:'卯巳',癸:'卯巳'};
  var shenSha='';
  var ym=yima['申子辰']; if(DZ.indexOf(dayZ)<6&&DZ.indexOf(dayZ)>=3)ym=yima['寅午戌']; else if(DZ.indexOf(dayZ)<9&&DZ.indexOf(dayZ)>=6)ym=yima['巳酉丑']; else if(DZ.indexOf(dayZ)>=9||DZ.indexOf(dayZ)==0||DZ.indexOf(dayZ)==1)ym=yima['亥卯未'];
  shenSha='<div style="margin-top:10px;background:rgba(13,21,37,.6);border:1px solid var(--bd);border-radius:10px;padding:10px;font-size:11px;color:var(--tx2);text-align:center"><b style="color:var(--gold-l)">神煞</b>&nbsp;';
  shenSha+='驿马：'+ym+' &nbsp;|&nbsp; 桃花：'+taohua[ym?Object.keys(yima).find(function(k){return yima[k]===ym})||'申子辰':'申子辰']+' &nbsp;|&nbsp;';
  shenSha+='干禄：'+(ganlu[dayGan]||'')+' &nbsp;|&nbsp; 贵人：'+(guiren[dayGan]||'')+'</div>';
  res.innerHTML=header+table+fushen+dongHua+shenSha+
    (origDB?'<div style="margin-top:8px;font-size:12px;line-height:1.8;text-align:center;color:var(--tx3)">卦辞：'+origDB.judgment+'</div>':'')+
    '<button class="btn-submit" onclick="doAIReading()" style="margin-top:12px">积分解锁 AI 解读</button>'+
    '<p style="text-align:center;font-size:11px;color:var(--tx3);margin-top:6px">排卦免费 · AI解读消耗1次积分</p>';
  res._zg=zg; res._chgZg=chgZg; res._origDB=origDB; res._movingLines=movingLines; res._lines=lines; res._chgLines=chgLines;
  }catch(e){ res.innerHTML='<div class="empty"><p>装卦异常：'+e.message+'</p></div>'; }
}

window.doAIReading=function(){
  var res=document.getElementById('result'); var zg=res._zg, chgZg=res._chgZg, origDB=res._origDB, moving=res._movingLines;
  if(typeof Auth==='undefined'||!Auth.isLoggedIn()){ Auth.showModal('login'); return; }
  res.innerHTML='<div class="loading"><div class="spinner"></div><p>正在AI解读...</p></div>';
  var prompt='你是"知时先生"，精通六爻断卦。请按以下步骤逐层分析，写300字专业解读：\n\n';
  prompt+='【卦象】本卦「'+zg.guaName+'」('+zg.gong+'宫·属'+zg.gongWX+')，世爻在第'+zg.shiYao+'爻('+zg.liuqin[zg.shiYao-1]+zg.yaoGan[zg.shiYao-1]+zg.yaoDZ[zg.shiYao-1]+')，应爻在第'+zg.yingYao+'爻('+zg.liuqin[zg.yingYao-1]+zg.yaoGan[zg.yingYao-1]+zg.yaoDZ[zg.yingYao-1]+')';
  if(moving.length) prompt+='。动爻：第'+moving.join('、')+'爻，变卦「'+(chgZg?chgZg.guaName:'')+'」';
  if(chgZg) prompt+='（变卦世爻在第'+chgZg.shiYao+'爻，对比进退可知吉凶方向）';
  prompt+='。\n';
  prompt+='【月建】'+zg.monthZhi+'月('+zg.monthWX+')，月建对各爻的生克旺衰如下：';
  for(var i=0;i<6;i++){ prompt+='第'+(i+1)+'爻'+zg.liuqin[i]+zg.yaoGan[i]+zg.yaoDZ[i]+'('+zg.yaoWX[i]+')处'+zg.wangShuai[i]+'态，月建'+zg.monthWX+zg.changSheng[i]+'；'; }
  prompt+='\n';
  if(moving.length){
    prompt+='【动爻化象】';
    moving.forEach(function(ml){
      var o=zg.liuqin[ml-1]+zg.yaoGan[ml-1]+zg.yaoDZ[ml-1]+'('+zg.yaoWX[ml-1]+')';
      var c=chgZg?chgZg.liuqin[ml-1]+chgZg.yaoGan[ml-1]+chgZg.yaoDZ[ml-1]+'('+chgZg.yaoWX[ml-1]+')':'?';
      prompt+='第'+ml+'爻从'+o+'→'+c+'；';
    });
  }
  prompt+='\n【六神】'+zg.liushen.join('、')+'。\n';
  prompt+='请分析：1.世爻与用神关系 2.动爻变化趋势 3.月建对各爻的生克影响 4.六神应何事 5.综合吉凶建议。语气专业、有理有据。返回JSON：{"reading":"完整解读"}';
  fetch('/api/divination',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
  .then(function(r){return r.json();}).then(function(d){
    res.innerHTML=res.innerHTML.replace(/<div class="loading">[^<]*<\/div>/,'')+'<div class="result-text">'+(d.reading||'').replace(/\n/g,'<br>')+'</div>';
  }).catch(function(){ res.innerHTML='<div class="result-text" style="text-align:center;color:var(--tx3)">解读暂不可用</div>'; });
};
</script>
