<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知时 · 我的档案</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.profile-page{max-width:600px;margin:80px auto 40px;padding:0 20px}
.profile-page h1{text-align:center;font-size:24px;color:var(--gold-l);letter-spacing:6px;margin-bottom:6px}
.profile-page .sub{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:32px;letter-spacing:2px}
.chart-card{
  display:block;background:var(--card);border:1px solid var(--bd);border-radius:12px;
  padding:18px 20px;margin-bottom:12px;text-decoration:none;transition:all .25s;
  position:relative;overflow:hidden;
}
.chart-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.15),transparent)}
.chart-card .label{font-size:15px;color:var(--tx);font-weight:600;margin-bottom:4px}
.chart-card .meta{font-size:11px;color:var(--tx3);display:flex;justify-content:space-between}
.chart-card .arrow{color:var(--gold);font-size:18px;position:absolute;right:20px;top:50%;transform:translateY(-50%)}
.chart-card .del{position:absolute;right:12px;top:8px;background:none;border:none;color:var(--tx3);font-size:10px;cursor:pointer;opacity:0;transition:opacity .2s}
.chart-card:hover .del{opacity:1}
.empty-state{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:13px;line-height:2}
.login-prompt{text-align:center;padding:60px 20px}
.login-prompt .btn{padding:12px 32px;border-radius:25px;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div class="profile-page">
  <h1>我的档案</h1>
  <div class="sub">积分 · 记录 · 排盘</div>
  <div id="content"></div>
</div>

<script src="js/auth.js"></script>
<script>
(function(){
  var content = document.getElementById('content');

  function render() {
    if (typeof Auth === 'undefined') return setTimeout(render, 300);
    Auth.ready(function() {
    if (!Auth.isLoggedIn()) {
      content.innerHTML =
        '<div class="login-prompt">' +
        '<div class="empty-state"><div class="icon">🔐</div><p>登录后可查看积分余额和排盘记录</p></div>' +
        '<button class="btn" onclick="Auth.showModal(\'login\')">登录</button>' +
        '</div>';
      return;
    }

    // 先显示加载状态
    content.innerHTML = '<div style="text-align:center;padding:40px"><div class="loading-spinner"></div></div>';

    // 并行加载积分+排盘
    var p1 = fetch('/api/auth/profile', { headers: { 'Authorization': 'Bearer ' + Auth.getToken() } }).then(function(r){return r.json()});
    var p2 = Auth.getData('saved_charts');

    Promise.all([p1, p2]).then(function(results){
      var profile = results[0];
      var charts = [];
      try { charts = JSON.parse(results[1] || '[]'); } catch(e) {}

      var html = '';
      // 积分卡片
      if (!profile.error) {
        html += '<div class="chart-card" style="margin-bottom:16px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center">';
        html += '<div><div style="font-size:11px;color:var(--tx3);letter-spacing:2px">积分余额</div>';
        html += '<div style="font-size:28px;font-weight:900;color:var(--gold-l)">' + (profile.is_monthly ? '∞' : (profile.credits||0)) + '</div>';
        html += '<div style="font-size:11px;color:var(--tx2)">' + (profile.is_monthly ? '月度会员 · '+(profile.monthly_expires||'').slice(0,10)+'到期' : '剩余次数') + '</div></div>';
        html += '<a href="/pricing" class="btn" style="text-decoration:none;padding:8px 16px;font-size:12px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border-radius:20px;font-weight:600;letter-spacing:1px">购买</a>';
        html += '</div></div>';

        // 购买记录
        if (profile.history && profile.history.length) {
          html += '<h3 style="font-size:13px;color:var(--tx3);letter-spacing:2px;margin-bottom:8px">购买记录</h3>';
          profile.history.forEach(function(h){
            html += '<div style="display:flex;justify-content:space-between;padding:8px 12px;margin-bottom:4px;background:rgba(255,255,255,.01);border-radius:8px;font-size:12px">';
            html += '<span><b style="color:var(--gold-l)">'+h.type+'</b> '+h.detail+'</span>';
            html += '<span style="color:var(--tx3)">'+(h.date||'').slice(0,10)+'</span></div>';
          });
        }
      }

      // 排盘记录
      html += '<h3 style="font-size:13px;color:var(--tx3);letter-spacing:2px;margin-top:16px;margin-bottom:8px">排盘记录</h3>';
      if (charts.length === 0) {
        html += '<div class="empty-state" style="padding:30px"><p style="font-size:12px">还没有排盘记录</p></div>';
      } else {
        charts.forEach(function(c, i) {
          html += '<div class="chart-card" style="cursor:pointer" onclick="location.href=\'/result?' + c.params + '\'">' +
            '<button class="del" onclick="event.stopPropagation();deleteChart(' + i + ')">删除</button>' +
            '<div class="label">' + c.label + '</div>' +
            '<div class="meta"><span>' + (c.saved_at ? c.saved_at.slice(0,10) : '') + '</span></div>' +
            '<span class="arrow">→</span></div>';
        });
      }
      content.innerHTML = html;
    }).catch(function(){ content.innerHTML = '<div class="empty-state"><p>加载失败，请刷新</p></div>'; });
  });
  }

  window.deleteChart = function(i) {
    if (!confirm('确定删除这条记录？')) return;
    Auth.getData('saved_charts').then(function(val) {
      var charts = [];
      try { charts = JSON.parse(val || '[]'); } catch(e) {}
      charts.splice(i, 1);
      Auth.syncData('saved_charts', JSON.stringify(charts)).then(function() {
        render();
      });
    });
  };

  render();
})();
</script>
</body>
</html>
