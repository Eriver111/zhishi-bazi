<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зҹҘж—¶ В· жў…иҠұжҳ“ж•°</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.meihua-page{max-width:600px;margin:80px auto 40px;padding:0 20px;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-title{text-align:center;font-size:24px;color:var(--gold-l);letter-spacing:6px;margin-bottom:6px}
.page-sub{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:32px;letter-spacing:2px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
.card h3{font-size:14px;color:var(--gold-l);letter-spacing:3px;margin-bottom:16px;text-align:center}
.num-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.num-row input{width:70px;padding:14px 8px;text-align:center;font-size:20px;font-weight:700;background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:10px;color:var(--gold-l);font-family:inherit;outline:none}
.num-row input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.1)}
.num-row .num-label{font-size:10px;color:var(--tx3);text-align:center}
.btn-submit{display:block;margin:20px auto 0;padding:14px 40px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none;border-radius:25px;cursor:pointer;letter-spacing:2px;font-family:inherit}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(201,168,76,.2)}
.btn-random{display:block;margin:8px auto 0;padding:8px 20px;font-size:12px;background:transparent;border:1px solid var(--bd2);color:var(--tx2);border-radius:20px;cursor:pointer;font-family:inherit;letter-spacing:1px}
.hexagram{text-align:center;padding:20px 0}
.hexagram .gua-name{font-size:28px;color:var(--gold-l);font-weight:900;letter-spacing:6px;margin-bottom:4px}
.hexagram .gua-yao{font-size:24px;color:var(--tx2);font-family:monospace;line-height:1.8;margin:8px 0}
.hexagram .gua-desc{font-size:12px;color:var(--tx3);line-height:1.8}
.hexagram .arrow{font-size:28px;color:var(--gold);margin:10px 0}
.result{font-size:14px;color:var(--tx);line-height:2.2;padding:8px 0}
.loading{text-align:center;padding:40px;color:var(--tx3)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="meihua-page">
  <div class="page-title">жў…иҠұжҳ“ж•°</div>
  <div class="page-sub">д»Ҙж•°иө·еҚҰ В· AI и§ЈеҚҰ В· й—®дәӢеҚ еҚң</div>

  <div class="card">
    <h3>иҫ“е…ҘдёүдёӘж•°еӯ—иө·еҚҰ</h3>
    <div class="num-row">
      <div><div class="num-label">дёҠеҚҰж•°</div><input type="number" id="n1" min="1" max="99" value="" placeholder="1"></div>
      <div><div class="num-label">дёӢеҚҰж•°</div><input type="number" id="n2" min="1" max="99" value="" placeholder="2"></div>
      <div><div class="num-label">еҠЁзҲ»ж•°</div><input type="number" id="n3" min="1" max="99" value="" placeholder="3"></div>
    </div>
    <button class="btn-submit" onclick="doGua()">иө·еҚҰ</button>
    <button class="btn-random" onclick="randomGua()">йҡҸжңәиө·еҚҰ</button>
  </div>

  <div id="result"></div>
</div>

<script src="js/yijing-db.js"></script>
<script src="js/auth.js"></script>
<script>
var TG=['д№ҫ','е…‘','зҰ»','йңҮ','е·Ҫ','еқҺ','иү®','еқӨ'];
var TG_ELEM=['еӨ©','жіҪ','зҒ«','йӣ·','йЈҺ','ж°ҙ','еұұ','ең°'];

function yaoStr(yao) { return yao.map(function(y){ return y===1?'в”Ғв”Ғв”Ғ':'в”Ғ в”Ғ'; }).join('<br>'); }

// д»Һж•°жҚ®еә“жҹҘжүҫеҚҰ
function findGua(name) { return YIJING.find(function(g){ return g.name===name; }); }

function getGua(n1,n2,n3){
  var up=n1%8||8, dn=n2%8||8, mv=n3%6||6;
  var upBin=(up-1).toString(2).padStart(3,'0');
  var dnBin=(dn-1).toString(2).padStart(3,'0');
  // д»ҺдәҢиҝӣеҲ¶жҺЁз®—еҚҰеҗҚ
  var trigramNames=['д№ҫ','е…‘','зҰ»','йңҮ','е·Ҫ','еқҺ','иү®','еқӨ'];
  var gName=trigramNames[up-1]+'дёә'+trigramNames[dn-1]; // fallback
  // з”Ёж•°жҚ®еә“зІҫзЎ®жҹҘжүҫ
  var found=YIJING.find(function(g){ return g.upper===trigramNames[up-1]&&g.lower===trigramNames[dn-1]; });
  if(found){ gName=found.name; }
  // еҠЁзҲ»
  var yao=upBin.split('').map(Number).concat(dnBin.split('').map(Number));
  var yaoLine=mv-1;
  var chgBin=origBin.split('');
  chgBin[yaoLine]=chgBin[yaoLine]==='1'?'0':'1';
  chgBin=chgBin.join('');
  var chgName=GUA64[chgBin]||'еҸҳеҚҰ';
  return {
    orig:{name:gName,yao:yao,up:TG[up-1],dn:TG[dn-1],upElem:TG_ELEM[up-1],dnElem:TG_ELEM[dn-1]},
    change:{name:chgName,yao:chgBin.split('').map(Number)},
    moving:mv,line:mv
  };
}

function randomGua(){
  document.getElementById('n1').value=Math.floor(Math.random()*99)+1;
  document.getElementById('n2').value=Math.floor(Math.random()*99)+1;
  document.getElementById('n3').value=Math.floor(Math.random()*99)+1;
  doGua();
}

function doGua(){
  var n1=parseInt(document.getElementById('n1').value)||1;
  var n2=parseInt(document.getElementById('n2').value)||2;
  var n3=parseInt(document.getElementById('n3').value)||3;
  var g=getGua(n1,n2,n3);
  var res=document.getElementById('result');
  res.innerHTML='<div class="loading"><div class="spinner"></div><p>жӯЈеңЁиө·еҚҰи§ЈеҚҰ...</p></div>';

  // д»Һж•°жҚ®еә“еҸ–еҚҰиҫһе’ҢзҲ»иҫһеҒҡй”ҡзӮ№
  var origDB=findGua(g.orig.name);
  var chgDB=findGua(g.change.name);
  var anchor='';
  if(origDB){
    anchor+='жң¬еҚҰгҖҠ'+origDB.name+'гҖӢпјҡеҚҰиҫһжӣ°"'+origDB.judgment+'"пјӣ'+origDB.meaning;
    if(origDB.lines&&origDB.lines[g.line-1]) anchor+=' еҠЁзҲ»зҲ»иҫһпјҡ"'+origDB.lines[g.line-1]+'"';
  }
  if(chgDB){ anchor+=' еҸҳеҚҰгҖҠ'+chgDB.name+'гҖӢпјҡ'+chgDB.meaning; }

  var prompt='дҪ жҳҜ"зҹҘж—¶е…Ҳз”ҹ"пјҢзІҫйҖҡжҳ“з»ҸгҖӮд»ҘдёӢеҚҰиұЎдҝЎжҒҜжҳҜзңҹе®һз»Ҹе…ёеҺҹж–ҮпјҢиҜ·еҹәдәҺиҝҷдәӣеҶ…е®№пјҢз”Ё150еӯ—еӨ§зҷҪиҜқеё®з”ЁжҲ·и§ЈиҜ»гҖӮдёҚиҰҒзј–йҖ еҚҰиҫһзҲ»иҫһпјҢеҸҜд»ҘиҜҙ"еҚҰиҫһжҸҗеҲ°...ж„ҸжҖқжҳҜ..."з„¶еҗҺеұ•ејҖгҖӮдёҠеҚҰ'+g.orig.up+'('+g.orig.upElem+')дёӢеҚҰ'+g.orig.dn+'('+g.orig.dnElem+')пјҢжң¬еҚҰгҖҢ'+g.orig.name+'гҖҚпјҢз¬¬'+g.line+'зҲ»еҠЁпјҢеҸҳеҚҰгҖҢ'+g.change.name+'гҖҚгҖӮ\n\nеҸӮиҖғеҺҹж–Үпјҡ'+anchor+'\n\nиҝ”еӣһJSONпјҡ{"reading":"дҪ зҡ„и§ЈиҜ»"}';

  fetch('/api/divination',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
    .then(function(r){return r.json();})
    .then(function(d){
      var tip=d.reading||'еҚҰе·Іиө·пјҢиҜ·йқҷеҝғйўҶжӮҹгҖӮ';
      res.innerHTML=
        '<div class="card"><div class="hexagram"><div class="gua-name">'+g.orig.name+'</div><div class="gua-yao">'+yaoStr(g.orig.yao)+'</div><div class="gua-desc">дёҠ'+g.orig.up+'пјҲ'+g.orig.upElem+'пјүдёӢ'+g.orig.dn+'пјҲ'+g.orig.dnElem+'пјү</div><div class="arrow">вҶ“ з¬¬'+g.line+'зҲ»еҠЁ вҶ“</div><div class="gua-name" style="font-size:20px">'+g.change.name+'</div><div class="gua-yao">'+yaoStr(g.change.yao)+'</div></div>'+
        (origDB?'<div style="background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.08);border-radius:8px;padding:12px;margin-bottom:12px;font-size:11px;color:var(--tx3);line-height:1.8"><b>еҚҰиҫһ</b> '+origDB.judgment+'</div>':'')+
        '<div class="result">'+tip+'</div></div>';
    }).catch(function(){res.innerHTML='<div class="card"><div class="hexagram"><div class="gua-name">'+g.orig.name+'</div><div class="gua-yao">'+yaoStr(g.orig.yao)+'</div><div class="arrow">вҶ“ з¬¬'+g.line+'зҲ»еҠЁ вҶ“</div><div class="gua-name" style="font-size:20px">'+g.change.name+'</div></div><div class="result" style="text-align:center;color:var(--tx3)">еҚҰе·Іиө·пјҢAIи§ЈиҜ»жҡӮдёҚеҸҜз”Ё</div></div>';});
}
</script>
</body>
</html>
