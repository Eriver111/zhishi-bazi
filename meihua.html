<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知时 · 梅花易数</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.meihua-page{max-width:600px;margin:80px auto 40px;padding:0 20px;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-title{text-align:center;font-size:24px;color:var(--gold-l);letter-spacing:6px;margin-bottom:6px}
.page-sub{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:32px;letter-spacing:2px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
.card h3{font-size:14px;color:var(--gold-l);letter-spacing:3px;margin-bottom:16px;text-align:center}
.num-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.num-row input{width:70px;padding:14px 8px;text-align:center;font-size:20px;font-weight:700;background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:10px;color:var(--gold-l);font-family:inherit;outline:none}
.num-row input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.1)}
.num-row .num-label{font-size:10px;color:var(--tx3);text-align:center}
.btn-submit{display:block;margin:20px auto 0;padding:14px 40px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none;border-radius:25px;cursor:pointer;letter-spacing:2px;font-family:inherit}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(201,168,76,.2)}
.btn-random{display:block;margin:8px auto 0;padding:8px 20px;font-size:12px;background:transparent;border:1px solid var(--bd2);color:var(--tx2);border-radius:20px;cursor:pointer;font-family:inherit;letter-spacing:1px}
.hexagram{text-align:center;padding:20px 0}
.hexagram .gua-name{font-size:28px;color:var(--gold-l);font-weight:900;letter-spacing:6px;margin-bottom:4px}
.hexagram .gua-yao{font-size:24px;color:var(--tx2);font-family:monospace;line-height:1.8;margin:8px 0}
.hexagram .gua-desc{font-size:12px;color:var(--tx3);line-height:1.8}
.hexagram .arrow{font-size:28px;color:var(--gold);margin:10px 0}
.result{font-size:14px;color:var(--tx);line-height:2.2;padding:8px 0}
.loading{text-align:center;padding:40px;color:var(--tx3)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 全屏卦象特效 */
.gua-reveal{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s}
.gua-reveal.fadeOut{animation:fadeOut .8s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}
.gua-reveal .reveal-yao{font-size:36px;opacity:0;animation:revealLine .5s forwards}
@keyframes revealLine{from{opacity:0;transform:scale(.5);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
.gua-reveal .reveal-yao:nth-child(1){animation-delay:.1s}
.gua-reveal .reveal-yao:nth-child(2){animation-delay:.3s}
.gua-reveal .reveal-yao:nth-child(3){animation-delay:.5s}
.gua-reveal .reveal-yao:nth-child(4){animation-delay:.7s}
.gua-reveal .reveal-yao:nth-child(5){animation-delay:.9s}
.gua-reveal .reveal-yao:nth-child(6){animation-delay:1.1s}
.gua-reveal .reveal-name{font-size:32px;color:var(--gold-l);font-weight:900;letter-spacing:8px;opacity:0;animation:revealLine .5s 1.4s forwards;margin-top:16px}
.gua-reveal .reveal-sub{font-size:12px;color:var(--tx3);letter-spacing:4px;opacity:0;animation:revealLine .5s 1.7s forwards;margin-top:8px}
</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(13,21,37,.9);border-bottom:1px solid rgba(201,168,76,.1);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)"><a href="/" style="font-size:20px;font-weight:900;letter-spacing:6px;color:#e8cf70;text-decoration:none">知时</a><div style="display:flex;gap:6px;flex-wrap:wrap"><a href="/" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">首页</a><a href="/paipan" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">排盘</a><a href="/hepan" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">合盘</a><a href="/fortune" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">运势</a><a href="/meihua" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">梅花</a><a href="/liuyao" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">六爻</a><a href="/ziwei" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">紫微</a><a href="/liuren" style="font-size:13px;color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px">大六壬</a><a href="/pricing" style="font-size:13px;color:#c9a84c;text-decoration:none;padding:6px 10px;border-radius:6px;border:1px solid rgba(201,168,76,.25)">积分</a></div></div>

<div class="meihua-page">
  <div class="page-title">梅花易数</div>
  <div class="page-sub">以数起卦 · AI 解卦 · 问事占卜</div>

  <div class="card">
    <h3>心中默念所问之事，输入数字起卦</h3>
    <div style="margin-bottom:12px">
      <input type="text" id="question" placeholder="你想问什么？（如：这份工作能成吗）" style="width:100%;padding:12px 16px;font-size:14px;font-family:inherit;background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:10px;color:var(--tx);outline:none">
    </div>
    <div class="num-row">
      <div><div class="num-label">上卦数</div><input type="number" id="n1" min="1" max="99" value="" placeholder="1-99"></div>
      <div><div class="num-label">下卦数</div><input type="number" id="n2" min="1" max="99" value="" placeholder="1-99"></div>
      <div><div class="num-label">动爻数</div><input type="number" id="n3" min="1" max="99" value="" placeholder="1-99"></div>
    </div>
    <button class="btn-submit" onclick="doGua()">起卦解卦</button>
    <button class="btn-random" onclick="randomGua()">随机起卦</button>
  </div>

  <div id="result"></div>
</div>

<script src="js/yijing-db.js"></script>
<script src="js/auth.js"></script>
<script>
var TG=['乾','兑','离','震','巽','坎','艮','坤'];
var TG_ELEM=['天','泽','火','雷','风','水','山','地'];

function yaoStr(y){ return y.map(function(v){ return v===1?'━━━':'━ ━'; }).join('<br>'); }
function findGua(name){ return YIJING.find(function(g){ return g.name===name; }); }

function getGua(n1,n2,n3){
  var up=n1%8||8, dn=n2%8||8, mv=n3%6||6;
  var upBin=(up-1).toString(2).padStart(3,'0');
  var dnBin=(dn-1).toString(2).padStart(3,'0');
  var origBin=upBin+dnBin;
  var tri=['乾','兑','离','震','巽','坎','艮','坤'];
  var gName=tri[up-1]+'为'+tri[dn-1];
  var found=YIJING.find(function(g){ return g.upper===tri[up-1]&&g.lower===tri[dn-1]; });
  if(found) gName=found.name;
  var yao=upBin.split('').map(Number).concat(dnBin.split('').map(Number));
  var chgBin=origBin.split(''); chgBin[mv-1]=chgBin[mv-1]==='1'?'0':'1'; chgBin=chgBin.join('');
  var chgFound=YIJING.find(function(g){
    var bu=(g.upper===tri[parseInt(chgBin.slice(0,3),2)]||tri.indexOf(g.upper)===parseInt(chgBin.slice(0,3),2));
    var bd=(g.lower===tri[parseInt(chgBin.slice(3,6),2)]||tri.indexOf(g.lower)===parseInt(chgBin.slice(3,6),2));
    return bu&&bd;
  });
  var chgName=chgFound?chgFound.name:(tri[parseInt(chgBin.slice(0,3),2)]+'为'+tri[parseInt(chgBin.slice(3,6),2)]);
  return {
    orig:{name:gName,yao:yao,up:tri[up-1],dn:tri[dn-1],upElem:TG_ELEM[up-1],dnElem:TG_ELEM[dn-1]},
    change:{name:chgName,yao:chgBin.split('').map(Number)},
    moving:mv,line:mv
  };
}

function randomGua(){
  document.getElementById('n1').value=Math.floor(Math.random()*99)+1;
  document.getElementById('n2').value=Math.floor(Math.random()*99)+1;
  document.getElementById('n3').value=Math.floor(Math.random()*99)+1;
  doGua();
}

function showGuaReveal(gName,yao,cb){
  var o=document.createElement('div'); o.className='gua-reveal';
  var h=''; for(var i=0;i<6;i++){ h+='<div class="reveal-yao" style="color:'+(yao[i]?'var(--gold-l)':'var(--tx2)')+'">'+(yao[i]?'━━━━━':'━   ━')+'</div>'; }
  o.innerHTML=h+'<div class="reveal-name">'+gName+'</div><div class="reveal-sub">卦 象 已 显</div>';
  document.body.appendChild(o);
  setTimeout(function(){ o.classList.add('fadeOut'); setTimeout(function(){ o.remove(); if(cb)cb(); },800); },4000);
}

function doGua(){
  var n1=parseInt(document.getElementById('n1').value)||1;
  var n2=parseInt(document.getElementById('n2').value)||2;
  var n3=parseInt(document.getElementById('n3').value)||3;
  var question=document.getElementById('question').value.trim();
  var g=getGua(n1,n2,n3);
  var res=document.getElementById('result');
  var origDB=findGua(g.orig.name);
  var chgDB=findGua(g.change.name);
  var anchor='';
  if(origDB){
    anchor+='本卦《'+origDB.name+'》：卦辞曰"'+origDB.judgment+'"；'+origDB.meaning;
    if(origDB.lines&&origDB.lines[g.line-1]) anchor+=' 动爻爻辞："'+origDB.lines[g.line-1]+'"';
  }
  if(chgDB) anchor+=' 变卦《'+chgDB.name+'》：'+chgDB.meaning;
  res._g=g; res._anchor=anchor; res._origDB=origDB;
  showGuaReveal(g.orig.name,g.orig.yao,function(){
  res.innerHTML=
    '<div class="card"><div class="hexagram"><div class="gua-name">'+g.orig.name+'</div><div class="gua-yao">'+yaoStr(g.orig.yao)+'</div><div class="gua-desc">上'+g.orig.up+'（'+g.orig.upElem+'）下'+g.orig.dn+'（'+g.orig.dnElem+'）</div><div class="arrow">↓ 第'+g.line+'爻动 ↓</div><div class="gua-name" style="font-size:20px">'+g.change.name+'</div><div class="gua-yao">'+yaoStr(g.change.yao)+'</div></div>'+
    (origDB?'<div class="gua-desc" style="margin-top:8px;font-size:12px;line-height:1.8">【卦辞】'+origDB.judgment+'<br>【解读】'+origDB.meaning+'</div>':'')+
    '<button class="btn-submit" onclick="window.unlockReading()" style="margin-top:16px">积分解锁 AI 解读</button>'+
    '<p style="text-align:center;font-size:11px;color:var(--tx3);margin-top:8px">排卦免费 · AI解读消耗1次积分</p></div>';
  });
}

window.unlockReading=function(){
  var res=document.getElementById('result');
  var g=res._g, anchor=res._anchor, origDB=res._origDB;
  var question=document.getElementById('question').value.trim();
  if(typeof Auth==='undefined'||!Auth.isLoggedIn()){ if(typeof Auth!=='undefined')Auth.showModal('login'); else alert('请先登录'); return; }
  res.innerHTML='<div class="loading"><div class="spinner"></div><p>正在AI解读...</p></div>';
  var qStr=question?'用户问："'+question+'"。':'';
  var prompt='你是"知时先生"，精通易经。'+qStr+'请基于以下经典原文，做一次完整的专业解卦。\n\n上卦'+g.orig.up+'('+g.orig.upElem+')下卦'+g.orig.dn+'('+g.orig.dnElem+')，本卦「'+g.orig.name+'」，第'+g.line+'爻动，变卦「'+g.change.name+'」。\n\n参考原文：'+anchor+'\n\n请按以下结构写300字左右的解读：\n1. 卦象分析：本卦的含义和整体态势\n2. 动爻解读：这一爻动意味着什么关键变化\n3. 变卦启示：变卦给这件事带来什么转机\n4. 综合建议：结合用户问题给出具体建议\n\n语气专业但不玄乎，让人感觉有深度又听得懂。返回JSON：{"analysis":"1.","yao_reading":"2.","change_insight":"3.","advice":"4."}';
  fetch('/api/divination',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
  .then(function(r){return r.json();}).then(function(d){
    var r=d.reading||'';
    var html='<div class="card"><div class="hexagram"><div class="gua-name">'+g.orig.name+'</div><div class="gua-yao">'+yaoStr(g.orig.yao)+'</div><div class="gua-desc">上'+g.orig.up+'（'+g.orig.upElem+'）下'+g.orig.dn+'（'+g.orig.dnElem+'）</div><div class="arrow">↓ 第'+g.line+'爻动 ↓</div><div class="gua-name" style="font-size:20px">'+g.change.name+'</div><div class="gua-yao">'+yaoStr(g.change.yao)+'</div></div>'+
    (origDB?'<div class="gua-desc" style="margin-top:8px;font-size:12px;line-height:1.8">【卦辞】'+origDB.judgment+'</div>':'');
    if(r){ html+='<div class="result" style="margin-top:16px;font-size:14px;line-height:2.2;color:var(--tx)">'+r.replace(/\n/g,'<br>')+'</div>'; }
    html+='</div>'; res.innerHTML=html;
  }).catch(function(){res.innerHTML='<div class="card"><div class="hexagram"><div class="gua-name">'+g.orig.name+'</div><div class="gua-yao">'+yaoStr(g.orig.yao)+'</div><div class="arrow">↓ 第'+g.line+'爻动 ↓</div><div class="gua-name" style="font-size:20px">'+g.change.name+'</div></div><div class="result" style="text-align:center;color:var(--tx3)">解读暂不可用，请稍后重试</div></div>';});
};

window.doGua=doGua;
window.randomGua=randomGua;
</script>
</body>
</html>
