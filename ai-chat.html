<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>知时先生 · AI 易学助手</title>
<meta name="description" content="知时先生，融合子平法与盲派体系的AI易学助手。">
<link rel="stylesheet" href="css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--ink,#080c14);color:var(--tx,#e2dcc8)}
.page{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto;position:relative}
/* 顶栏 */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bd,rgba(201,168,76,.1));background:var(--ink);flex-shrink:0}
.topbar .back{color:var(--tx2);text-decoration:none;font-size:20px;padding:4px 8px}
.topbar .title{flex:1;font-size:18px;color:var(--gold-l);letter-spacing:3px;font-weight:700}
.topbar .mode-btn{padding:5px 14px;border-radius:14px;border:1px solid var(--bd2);background:none;color:var(--tx2);font-size:12px;cursor:pointer;letter-spacing:1px;font-family:inherit}
.topbar .mode-btn.pro{color:var(--gold-l);border-color:var(--gold);background:rgba(201,168,76,.08)}
.topbar .credits{font-size:13px;color:var(--tx2)}
.topbar .credits strong{color:var(--gold-l);font-size:16px}
/* 消息区 */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;max-width:90%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.msg.user .avatar{background:rgba(80,160,200,.15);color:#64B5F6}
.msg.ai .avatar{background:rgba(201,168,76,.12);color:var(--gold-l)}
.msg .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word}
.msg.user .bubble{background:rgba(80,160,200,.1);color:var(--tx);border-top-right-radius:4px}
.msg.ai .bubble{background:rgba(13,21,37,.8);border:1px solid rgba(201,168,76,.12);color:var(--tx);border-top-left-radius:4px}
.msg.ai .bubble strong{color:var(--gold-l)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx3);gap:8px;padding:40px}
.empty-state .icon{font-size:48px;opacity:.5}
.empty-state h3{color:var(--gold-l);font-size:18px;letter-spacing:3px}
.empty-state p{font-size:13px;text-align:center;line-height:1.8}
/* 底部栏 */
.bottombar{flex-shrink:0;border-top:1px solid var(--bd);background:var(--ink);padding:8px 12px 12px}
.redeem-row{display:flex;gap:8px;margin-bottom:8px}
.redeem-row input{flex:1;padding:8px 12px;background:rgba(20,20,36,.6);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:var(--tx);font-size:13px;font-family:monospace;letter-spacing:2px;text-align:center;outline:none}
.redeem-row input:focus{border-color:var(--gold)}
.redeem-row button{padding:8px 16px;border-radius:10px;border:1px solid var(--bd2);background:none;color:var(--gold-l);font-size:12px;cursor:pointer;letter-spacing:1px;white-space:nowrap}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;padding:10px 14px;background:rgba(20,20,36,.6);border:1px solid rgba(255,255,255,.06);border-radius:18px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.4}
.input-row textarea:focus{border-color:var(--gold)}
.input-row .send{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.input-row .send:disabled{opacity:.3}
.share-bar{display:none;text-align:center;padding:8px 0}
.share-bar button{padding:8px 20px;border-radius:16px;border:none;background:linear-gradient(135deg,#4CAF50,#2d8a4a);color:#fff;font-size:13px;cursor:pointer;letter-spacing:1px;font-family:inherit}
.share-bar .hint{display:block;font-size:11px;color:var(--tx3);margin-top:4px}
.share-bar .hint a{color:var(--gold)}
.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,.4);animation:typing 1s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,100%{opacity:.2}50%{opacity:1}}
</style>
</head>
<body>
<!-- 加载动画 -->
<div id="splash" style="position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0a0f18 0%,#060a10 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s">
  <!-- 五行图闪金光 -->
  <div id="sp-wx" style="text-align:center;opacity:0;transition:opacity .5s">
    <div style="font-size:60px;animation:spGlow 1s ease-in-out infinite">⭐</div>
    <div style="color:#e8cf70;font-size:16px;letter-spacing:3px;margin-top:8px">五行图分析中</div>
  </div>
  <!-- 金色眼睛看书 -->
  <div id="sp-eye" style="text-align:center;opacity:0;transition:opacity .5s;position:absolute">
    <div style="font-size:60px">👁️</div>
    <div style="color:#e8cf70;font-size:16px;letter-spacing:3px;margin-top:8px">盲派算法分析中</div>
  </div>
  <!-- 格局旋转 -->
  <div id="sp-pattern" style="text-align:center;opacity:0;transition:opacity .5s;position:absolute">
    <div style="position:relative;width:160px;height:160px;margin:0 auto">
      <span style="position:absolute;top:0;left:50%;transform:translateX(-50%);color:#e8cf70;font-size:18px;font-weight:700">身强</span>
      <span style="position:absolute;top:50%;right:0;transform:translateY(-50%);color:#e8cf70;font-size:18px;font-weight:700">身弱</span>
      <span style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);color:#e8cf70;font-size:18px;font-weight:700">格局</span>
      <span style="position:absolute;top:50%;left:0;transform:translateY(-50%);color:#e8cf70;font-size:18px;font-weight:700">用神</span>
    </div>
    <div style="color:#e8cf70;font-size:16px;letter-spacing:3px;margin-top:16px">子平派分析中</div>
  </div>
  <style>
    @keyframes spGlow{0%,100%{filter:drop-shadow(0 0 10px #c9a84c)}50%{filter:drop-shadow(0 0 30px #f0e0a0)}}
  </style>
</div>

<div class="page">
  <!-- 顶栏 -->
  <div class="topbar">
    <a href="javascript:history.back()" class="back">←</a>
    <span class="title">知时先生</span>
    <button class="mode-btn" id="modeBtn" onclick="toggleMode()">白话</button>
    <span class="credits" id="creditsLabel"></span>
  </div>

  <!-- 消息 -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">🏮</div>
      <h3>知时先生</h3>
      <p id="emptyDesc">首次体验免费，可提问 2 次<br>融合子平法与盲派体系</p>
    </div>
  </div>

  <!-- 底部 -->
  <div class="bottombar">
    <div class="redeem-row" id="redeemRow">
      <input type="text" id="redeemInput" placeholder="输入兑换码" maxlength="16">
      <button onclick="redeem()">激活</button>
    </div>
    <div class="share-bar" id="shareBar">
      <button onclick="doShare()">分享给好友 · 得1次提问</button>
      <span class="hint">如需多次提问请前往 <a href="pricing.html">积分方案</a></span>
    </div>
    <div class="input-row" id="inputRow">
      <textarea id="input" placeholder="输入你的问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="send" id="sendBtn" onclick="send()">▶</button>
    </div>
  </div>
</div>

<script>
var AI={credits:0,code:'',messages:[],isWaiting:false,isMonthly:false,mode:'simple',freeRemaining:0,freeId:''};

// 加载动画编排
(function runSplash(){
  var wx=document.getElementById('sp-wx'), eye=document.getElementById('sp-eye'), pt=document.getElementById('sp-pattern'), splash=document.getElementById('splash');
  if(!splash) return;
  // 1. 五行图 0-1.2s
  setTimeout(function(){wx.style.opacity='1'},100);
  setTimeout(function(){wx.style.opacity='0'},1300);
  // 2. 盲派眼睛 1.3-2.5s
  setTimeout(function(){eye.style.opacity='1'},1400);
  setTimeout(function(){eye.style.opacity='0'},2600);
  // 3. 子平派格局旋转 2.6-3.8s
  setTimeout(function(){pt.style.opacity='1'},2700);
  setTimeout(function(){pt.style.opacity='0'},3800);
  // 4. 隐藏splash
  setTimeout(function(){splash.style.opacity='0'},3900);
  setTimeout(function(){splash.remove()},4500);
})();

(function init(){
  AI.freeId=localStorage.getItem('ai_free_id')||('f_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8));
  localStorage.setItem('ai_free_id',AI.freeId);
  var used=parseInt(localStorage.getItem('ai_free_used')||'0');
  AI.freeRemaining=Math.max(0,2-used);
  updateCreditsUI();

  // 恢复会话
  var savedCode=localStorage.getItem('ai_chat_code');
  if(savedCode){
    fetch('/api/credits?code='+encodeURIComponent(savedCode)).then(function(r){return r.json()}).then(function(d){
      if(d.credits>0){AI.code=savedCode;AI.credits=d.credits;updateCreditsUI()}
      else if(d.credits===-1){AI.code=savedCode;AI.isMonthly=true;document.getElementById('creditsLabel').innerHTML='<strong>∞</strong> 会员'}
    });
  }

  // 检测分享来访
  var m=location.search.match(/ref=([^&]+)/);
  if(m){fetch('/api/referral?ref='+m[1]+'&visitor='+AI.freeId).then(function(r){return r.json()}).then(function(d){
    if(d.success){AI.freeRemaining=1;localStorage.setItem('ai_free_used','0');updateCreditsUI();addMsg('ai','朋友邀请你来的！你获得了 1 次额外免费提问。')}
  })}
})();

function updateCreditsUI(){
  var el=document.getElementById('creditsLabel');
  if(AI.isMonthly){el.innerHTML='<strong>∞</strong> 会员';return}
  if(AI.freeRemaining>0){el.innerHTML='免费<strong>'+AI.freeRemaining+'</strong>次';return}
  if(AI.credits>0){el.innerHTML='剩余<strong>'+AI.credits+'</strong>次';return}
  el.innerHTML='';
  document.getElementById('shareBar').style.display=AI.freeRemaining<=0?'block':'none';
}

function addMsg(role,text){
  AI.messages.push({role:role,content:text});
  var d=document.getElementById('emptyState');if(d)d.style.display='none';
  var div=document.createElement('div');div.className='msg '+role;
  div.innerHTML='<div class="avatar">'+(role==='user'?'我':'师')+'</div><div class="bubble">'+text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')+'</div>';
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop=99999;
}

function showTyping(){
  var d=document.createElement('div');d.className='typing';d.id='typing';
  d.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('messages').appendChild(d);
  document.getElementById('messages').scrollTop=99999;
}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove()}

function toggleMode(){
  AI.mode=AI.mode==='simple'?'pro':'simple';
  var btn=document.getElementById('modeBtn');
  btn.textContent=AI.mode==='simple'?'白话':'专业';
  btn.className='mode-btn'+(AI.mode==='pro'?' pro':'');
}

function send(){
  if(AI.isWaiting)return;
  var inp=document.getElementById('input');var text=inp.value.trim();if(!text)return;
  if(AI.freeRemaining<=0&&AI.credits<=0&&!AI.isMonthly){document.getElementById('shareBar').style.display='block';return}
  inp.value='';AI.isWaiting=true;document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);showTyping();

  var body={question:text,mode:AI.mode,history:AI.messages.slice(-6)};
  // 附加上次从结果页保存的排盘数据
  try { var cd=localStorage.getItem('ai_chart_data'); if(cd) body.chartData=JSON.parse(cd); } catch(ex) {}
  if(AI.freeRemaining>0&&!AI.isMonthly&&AI.credits<=0){body.free_mode=true;body.free_id=AI.freeId}
  else{body.code=AI.code}

  fetch('/api/ai-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){return r.json()}).then(function(d){
    hideTyping();AI.isWaiting=false;document.getElementById('sendBtn').disabled=false;
    if(d.error){addMsg('ai',d.error);if(d.free_exhausted){AI.freeRemaining=0;localStorage.setItem('ai_free_used','2');updateCreditsUI()}return}
    addMsg('ai',d.reply);
    if(d.is_free){AI.freeRemaining=d.free_remaining;var used=2-d.free_remaining;localStorage.setItem('ai_free_used',used);updateCreditsUI()}
    if(d.credits_left>=0){AI.credits=d.credits_left;updateCreditsUI()}
    if(d.is_monthly){AI.isMonthly=true;updateCreditsUI()}
  }).catch(function(e){hideTyping();AI.isWaiting=false;document.getElementById('sendBtn').disabled=false;addMsg('ai','网络错误，请重试')});
}

function redeem(){
  var cd=document.getElementById('redeemInput').value.trim();if(!cd)return;
  fetch('/api/credits?code='+encodeURIComponent(cd)).then(function(r){return r.json()}).then(function(d){
    if(d.error){alert(d.error);return}
    if(d.credits>0){AI.code=cd;AI.credits+=d.credits;AI.isMonthly=false;localStorage.setItem('ai_chat_code',cd);localStorage.setItem('ai_chat_type','credits');updateCreditsUI();addMsg('ai','兑换成功！获得 '+d.credits+' 次提问。')}
    else if(d.credits===-1){AI.code=cd;AI.isMonthly=true;localStorage.setItem('ai_chat_code',cd);localStorage.setItem('ai_chat_type','monthly');updateCreditsUI();addMsg('ai','月度会员已激活，30天内无限次提问。')}
  }).catch(function(){alert('网络错误')});
}

function doShare(){
  var url='https://zhishi.online/?ref='+AI.freeId;
  if(navigator.share){navigator.share({title:'知时',text:'AI+传统易学，前两次免费体验',url:url}).catch(function(){})}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert('链接已复制！发给朋友即可')})}
  else{prompt('复制链接分享：',url)}
  fetch('/api/referral',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:AI.code||'',freeId:AI.freeId,action:'share'})}).catch(function(){});
}
</script>
</body>
</html>
