<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>紫微三合盘 · 完整数据</title>
<style>
:root{--ink:#080c14;--card:rgba(13,21,37,.95);--gold:#c9a84c;--tx:#e2dcc8;--tx2:#b0a090;--tx3:#7a7570;--bd:rgba(201,168,76,.2)}
body{background:var(--ink);color:var(--tx);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;justify-content:center;min-height:100vh;margin:0;padding:20px}
.wrap{max-width:900px;width:100%}
h2{text-align:center;color:var(--gold);letter-spacing:6px;font-size:22px;margin:0 0 12px}
.info{text-align:center;font-size:15px;color:var(--tx3);margin-bottom:12px;line-height:1.8}
.info b{color:#e8cf70}

.grid{display:grid;grid-template-columns:1fr 0.55fr 0.55fr 1fr;grid-template-rows:repeat(4,1fr);gap:3px;width:100%;aspect-ratio:1;max-width:860px;margin:0 auto;background:rgba(201,168,76,.04);border:1px solid var(--bd);border-radius:4px;padding:3px}
.palace{background:var(--card);border:1px solid rgba(91,127,165,.08);position:relative;overflow:hidden}
.palace.ming{border-color:rgba(201,168,76,.35);box-shadow:inset 0 0 20px rgba(201,168,76,.04)}
.palace.shen{border-color:rgba(91,159,212,.25);background:rgba(91,159,212,.03)}

.stars{position:absolute;left:3px;top:4px;bottom:4px;display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:0;writing-mode:vertical-rl;text-orientation:upright;font-size:14px;color:#d0c8b0;line-height:1.2;max-width:85%}
.stars .s{letter-spacing:1px;white-space:nowrap}
.stars .s.major{font-size:16px;font-weight:600;color:#e0d0b0}
.stars .s .b{font-size:9px}
/* 四化子包：主星和四化在一个竖列 */
.star-hua-wrap{display:flex;flex-direction:column;align-items:center;writing-mode:horizontal-tb;gap:1px}
.star-hua-wrap .s{display:block}

.mid{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;writing-mode:horizontal-tb}
.mid .row1,.mid .row2{display:flex;align-items:center;gap:3px;font-size:15px;color:#8a8580}
.mid .row2{font-size:12px;color:#6a6570}
.mid .ln-label,.mid .xx-label{font-size:12px;color:#b0a898;font-weight:600;margin-right:2px}
.mid .xx-label{font-size:10px;color:#9a9590}
.mid .daxian{font-size:15px;color:#8a8580;margin-top:2px}

.bot-l{position:absolute;left:4px;bottom:4px;display:flex;flex-direction:column;align-items:flex-start;line-height:1.4;font-size:12px;color:#8a8580;writing-mode:horizontal-tb;gap:1px}

.bot-r{position:absolute;right:6px;bottom:4px;display:flex;flex-direction:column;align-items:flex-end;line-height:1.3;font-size:14px;color:var(--tx2)}
.bot-r .zs{font-size:14px;color:var(--tx2)}
.bot-r .gz{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:1px}

.pname{position:absolute;bottom:5px;left:50%;transform:translateX(20%);font-size:14px;color:var(--gold);letter-spacing:2px;font-weight:600}

.center-cell{background:var(--card);border:1px solid rgba(201,168,76,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.8}
.center-cell .c-title{font-size:17px;color:#e8cf70;font-weight:700;letter-spacing:4px}
.center-cell .c-info{font-size:12px;color:var(--tx3)}

.triad-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.triad-card{background:rgba(13,21,37,.6);border:1px solid rgba(91,127,165,.08);border-radius:10px;padding:14px}
.triad-card .t-name{font-size:15px;color:#e8cf70;letter-spacing:2px;margin-bottom:4px;font-weight:700}
.triad-card .t-palaces{font-size:15px;color:var(--tx3);margin-bottom:6px}
.triad-card .t-summary{font-size:15px;color:var(--tx2);line-height:1.7}

.svg-overlay{position:absolute;inset:0;pointer-events:none;z-index:10}
.svg-overlay line{stroke:rgba(201,168,76,.4);stroke-width:2;stroke-dasharray:6 3}
.svg-overlay line.opp{stroke:rgba(91,159,212,.4);stroke-dasharray:3 3}
.palace.hl{border-color:rgba(201,168,76,.6)!important;box-shadow:0 0 20px rgba(201,168,76,.2)!important}
.palace.hl2{border-color:rgba(91,159,212,.4)!important;box-shadow:0 0 15px rgba(91,159,212,.12)!important}

.svg-overlay{position:absolute;inset:0;pointer-events:none;z-index:10}
.svg-overlay line{stroke:rgba(201,168,76,.4);stroke-width:2;stroke-dasharray:6 3}
.svg-overlay line.opp{stroke:rgba(91,159,212,.4);stroke-dasharray:3 3}
.palace.hl{border-color:rgba(201,168,76,.6)!important;box-shadow:0 0 20px rgba(201,168,76,.2)!important}
.palace.hl2{border-color:rgba(91,159,212,.4)!important;box-shadow:0 0 15px rgba(91,159,212,.12)!important}
</style></head><body>
<div class="wrap">
<h2>紫微斗数 · 三合盘</h2>
<div class="info" id="infoBar"></div>
<div style="position:relative"><div style="position:relative"><div class="grid" id="zwGrid"></div><svg class="svg-overlay" id="svgLines"></svg></div><svg class="svg-overlay" id="svgLines"></svg></div>
<div class="triad-grid" id="triads"></div>
</div>

<script src="js/lunar.js?v=99"></script>
<script src="js/ziwei-db.js?v=99"></script>
<script src="js/ziwei.js?v=99"></script>
<script>
(function(){
var zw=ZIWEI_CALC.calcZiwei(2004,8,14,1,true);
var chart=zw.chart;
document.getElementById('infoBar').innerHTML='命宫：<b>'+zw.mingGong+'</b> | '+zw.wuxingJu+' | 身宫：<b>'+(zw.shenGong||'—')+'</b> | 命主：<b>'+zw.mingZhu+'</b> | 身主：<b>'+zw.shenZhu+'</b> | 阳男 | 甲申年六月廿九丑时';

var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
// 动态地支→网格位置映射（根据命宫位置计算）
var mingZhi=chart['命宫'].zhi;
var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var mingIdx=DZ.indexOf(mingZhi);
// 固定网格位置对应的地支偏移（从命宫推算）
var gridPositions={c12:(mingIdx+11)%12, c11:mingIdx, c10:(mingIdx+1)%12, c9:(mingIdx+2)%12, c1:(mingIdx+10)%12, c8:(mingIdx+3)%12, c2:(mingIdx+9)%12, c7:(mingIdx+4)%12, c3:(mingIdx+8)%12, c4:(mingIdx+7)%12, c5:(mingIdx+6)%12, c6:(mingIdx+5)%12};

var palaceOrder=['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
var zhiToPalace={};
palaceOrder.forEach(function(name){ zhiToPalace[chart[name].zhi]=chart[name];zhiToPalace[chart[name].zhi]._name=name; });

var starColor={紫微:'#e8d5a3',天府:'#e8d5a3',太阳:'#e07050',武曲:'#e8d5a3',天相:'#5b9fd4',天梁:'#6db86d',七杀:'#e07050',破军:'#e07050',贪狼:'#e8a040',巨门:'#5b9fd4',廉贞:'#e07050',天同:'#6db86d',太阴:'#5b9fd4',天机:'#6db86d'};
var brightLabel=['','庙','旺','得','平','不','陷'];
var grid=document.getElementById('zwGrid');

// 使用动态gridPositions映射
Object.keys(gridPositions).forEach(function(gridKey){
  var zhiIdx=gridPositions[gridKey];
  var zhi=DZ[zhiIdx];
  var p=zhiToPalace[zhi]; if(!p) return;
  var isMing=p._name==='命宫',isShen=p._name===zw.shenGong;
  var cls='palace'+(isMing?' ming':'')+(isShen?' shen':'');

  // 星曜左列：主星+辅星+杂星 竖排
  var sh='';
  var huaLabel='';
  if(p.hua.length){ var lb={lu:'禄',quan:'权',ke:'科',ji:'忌'}; huaLabel=p.hua.map(function(h){return lb[h]||h;}).join(''); }
  if(p.starInfo&&p.starInfo.length){
    p.starInfo.forEach(function(si,i){
      var bl=si.bright>0?brightLabel[si.bright]:'';
      var clr=starColor[si.name]||'#d0c8b0';
      var isFirst=(i===0);
      var starSpan='<span class="s'+(i===0?' major':'')+'" style="color:'+clr+'">'+si.name+(bl?'<sup class="b" style="color:'+(si.bright<=2?'#e04040':si.bright===3?'#e8a040':'#888')+'">'+bl+'</sup>':'')+'</span>';
      if(isFirst&&huaLabel){
        sh+='<span class=\"star-hua-wrap\">'+starSpan+'<span class=\"s\" style=\"color:#e8a040\">'+huaLabel+'</span></span>';
      } else {
        sh+=starSpan;
      }
    });
  }
  // 辅星+亮度
  if(p.minors.length){ sh+=p.minors.map(function(m){
    var bTable=ZIWEI.minorBright[m];
    var bLevel=bTable?bTable[['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'].indexOf(p.zhi)]:0;
    var bl=bLevel>0?brightLabel[bLevel]:'';
    return '<span class="s" style="color:#9098a0;font-size:15px">'+m+(bl?'<sup class="b" style="color:'+(bLevel<=2?'#e04040':bLevel===3?'#e8a040':'#888')+'">'+bl+'</sup>':'')+'</span>';
  }).join('');}
  // 杂星
  // 杂星+亮度
  if(p.zaXing&&p.zaXing.length){ sh+=p.zaXing.map(function(zx){
    var zTable=ZIWEI.zaBright[zx];
    var zLevel=zTable?zTable[['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'].indexOf(p.zhi)]:0;
    var zl=zLevel>0?brightLabel[zLevel]:'';
    return '<span class="s" style="color:#6a6570;font-size:15px">'+zx+(zl?'<sup class="b" style="color:'+(zLevel<=2?'#e04040':zLevel===3?'#e8a040':'#888')+'">'+zl+'</sup>':'')+'</span>';
  }).join('');}
  if(!sh) sh='<span class="s" style="color:#555">—</span>';

  // 左下：博士 + 将前 + 岁前
  var blArr=[p.boShi||'',p.jiangQian||'',p.suiQian||''].filter(Boolean);

  var cell=document.createElement('div');cell.className=cls;
  var gz=(p.gan||'')+p.zhi;
  cell.innerHTML=
    '<div class="stars">'+sh+'</div>'+
    '<div class="mid">'+
      '<div class="row1"><span class="ln-label">流年</span>'+(p.liuNian||'').split(',').map(function(n){return '<span>'+n+'</span>';}).join('')+'</div>'+
      '<div class="row2"><span class="xx-label">小限</span>'+(p.xiaoXian||'').split(',').map(function(n){return '<span>'+n+'</span>';}).join('')+'</div>'+
      '<div class="daxian">'+(p.daXian||'')+'</div>'+
    '</div>'+
    '<div class="bot-l">'+blArr.map(function(x){return '<span>'+x+'</span>';}).join('')+'</div>'+
    '<div class="bot-r"><span class="zs">'+(p.changSheng||'')+'</span><span class="gz">'+gz.charAt(0)+'</span><span class="gz">'+gz.charAt(1)+'</span></div>'+
    '<div class="pname">'+p._name+'</div>';
  cell.addEventListener('click',function(){showTriLinks(zhi,p._name);});
  grid.appendChild(cell);
});

// === 三方四正连线 ===
var DZ_=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var triadsGroup={0:[0,4,8],1:[1,5,9],2:[2,6,10],3:[3,7,11]}; // 地支三合组

function showTriLinks(zhi,palName){
  var allCells=document.querySelectorAll('.palace');
  allCells.forEach(function(el){el.classList.remove('hl','hl2');});

  // Highlight all三合+对宫 cells
  var zhiIdx=DZ_.indexOf(zhi);
  var oppIdx=(zhiIdx+6)%12;
  var triadGroup=triadsGroup[zhiIdx%4];
  var oppGroup=triadsGroup[oppIdx%4];

  allCells.forEach(function(el){
    var cellZhi=el.dataset.zhi;
    if(!cellZhi)return;
    var ci=DZ_.indexOf(cellZhi);
    if(ci===zhiIdx)el.classList.add('hl');
    else if(ci===oppIdx||triadGroup.indexOf(ci)>=0)el.classList.add('hl');
    else if(oppGroup.indexOf(ci)>=0)el.classList.add('hl2');
  });

  // Draw lines
  drawTriLines(zhiIdx,triadGroup,oppIdx);
}

function drawTriLines(center,triad,opp){
  var svg=document.getElementById('svgLines');
  var grid=document.getElementById('zwGrid');
  var gr=grid.getBoundingClientRect();

  // Get center positions of all relevant cells
  function centerPos(zhi){
    var el=document.querySelector('.palace[data-zhi="'+DZ_[zhi]+'"]');
    if(!el)return null;
    var r=el.getBoundingClientRect();
    return {x:r.left+r.width/2-gr.left, y:r.top+r.height/2-gr.top};
  }

  svg.setAttribute('viewBox','0 0 '+gr.width+' '+gr.height);
  svg.style.width=gr.width+'px';
  svg.style.height=gr.height+'px';

  var html='';
  var cp=centerPos(center);
  if(!cp)return;

  // Lines to三合 partners
  triad.forEach(function(t){
    if(t===center)return;
    var tp=centerPos(t);
    if(tp) html+='<line x1="'+cp.x+'" y1="'+cp.y+'" x2="'+tp.x+'" y2="'+tp.y+'"/>';
  });
  // Line to对宫
  var op=centerPos(opp);
  if(op) html+='<line class="opp" x1="'+cp.x+'" y1="'+cp.y+'" x2="'+op.x+'" y2="'+op.y+'"/>';

  svg.innerHTML=html;
}

// Set data-zhi attributes after grid renders
setTimeout(function(){
  var cells=document.querySelectorAll('.palace');
  var gridOrder=['巳','午','未','申','辰','酉','卯','戌','寅','丑','子','亥'];
  cells.forEach(function(el,i){
    if(i<gridOrder.length)el.dataset.zhi=gridOrder[i];
  });
},100);

// 中央
var center=document.createElement('div');center.className='center-cell';
center.style.cssText='grid-area:2/2/4/4';
center.innerHTML=
  '<div class="c-title">'+zw.wuxingJu.replace('局','')+'<br>局</div>'+'<div class="c-info" style="font-size:9px">真太阳时 1:53</div>'+'<div class="c-info" style="font-size:9px">钟表 2:16 丑时</div>'+'<div class="c-info" style="font-size:10px">真太阳时 '+zw.trueSolar+'</div>'+'<div class="c-info" style="font-size:10px">钟表 '+zw.clockTime+'</div>'+
  '<div class="c-info">命主 '+zw.mingZhu+'</div>'+
  '<div class="c-info">身主 '+zw.shenZhu+'</div>'+
  '<div class="c-info" style="color:#e8cf70;font-size:15px;margin-top:2px">身宫 '+zw.shenGong+'</div>';
grid.appendChild(center);

// 三方四正
var td=document.getElementById('triads');
zw.triads.forEach(function(t){
  var card=document.createElement('div');card.className='triad-card';
  card.innerHTML='<div class="t-name">'+t.name+'</div><div class="t-palaces">'+t.palaces+'</div><div class="t-summary">'+t.summary+'</div>';
  td.appendChild(card);
});
})();
</script>
</body></html>
