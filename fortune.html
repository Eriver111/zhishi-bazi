<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知时 · 今日运势</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.fortune-page{max-width:640px;margin:80px auto 40px;padding:0 20px;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fortune-header{text-align:center;margin-bottom:32px}
.fortune-header .brand{font-size:42px;font-weight:900;letter-spacing:16px;
  background:linear-gradient(180deg,var(--gold-l),var(--gold),var(--gold-d));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.fortune-header .sub{font-size:13px;color:var(--tx3);letter-spacing:4px;margin-top:6px}
.fortune-header .date{font-size:12px;color:var(--tx3);margin-top:4px;letter-spacing:2px}
.chart-select{text-align:center;margin-bottom:24px}
.chart-select select{background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:8px;color:var(--tx);padding:10px 16px;font-size:14px;font-family:inherit;cursor:pointer;min-width:200px}
.fortune-card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden;backdrop-filter:blur(16px)}
.fortune-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
.fortune-card .section-label{font-size:11px;color:var(--gold-l);letter-spacing:4px;margin-bottom:10px;font-weight:600}
.fortune-card .overview{font-size:15px;color:var(--tx);line-height:2.2;margin-bottom:6px}
.fortune-card .row{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.fortune-card .row .item{flex:1;min-width:140px;background:rgba(20,25,40,.4);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:16px;text-align:center}
.item .icon{font-size:24px;margin-bottom:6px}
.item .label{font-size:10px;color:var(--tx3);letter-spacing:2px;margin-bottom:4px}
.item .text{font-size:13px;color:var(--tx2);line-height:1.8}
.quote{text-align:center;padding:20px 16px;color:rgba(201,168,76,.3);font-size:12px;letter-spacing:3px;font-style:italic;line-height:2}
.loading{text-align:center;padding:60px;color:var(--tx3)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty .icon{font-size:48px;margin-bottom:16px;opacity:.5}
</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(13,21,37,.92);border-bottom:1px solid rgba(201,168,76,.1);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:13px"><a href="/" style="font-size:18px;font-weight:900;letter-spacing:4px;color:#e8cf70;text-decoration:none;margin-right:8px">知时</a><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap"><a href="/paipan" style="color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px;white-space:nowrap">八字排盘</a><a href="/ziwei" style="color:#a09888;text-decoration:none;padding:6px 10px;border-radius:6px;white-space:nowrap">紫微斗数</a><div style="position:relative;display:inline-block" onmouseenter="this.querySelector('.dd-menu').style.display='block'" onmouseleave="this.querySelector('.dd-menu').style.display='none'"><span onclick="var m=this.nextElementSibling;m.style.display=m.style.display=='block'?'none':'block'" style="color:#a09888;cursor:pointer;padding:6px 10px;border-radius:6px;white-space:nowrap;user-select:none">更多 ▾</span><div class="dd-menu" style="display:none;position:absolute;top:100%;left:0;background:rgba(13,21,37,.96);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:4px 0;min-width:120px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.6)"><a href="/hepan" style="display:block;color:#a09888;text-decoration:none;padding:8px 16px;white-space:nowrap;transition:all .2s" onmouseenter="this.style.background='rgba(201,168,76,.06)';this.style.color='#e8cf70'" onmouseleave="this.style.background='transparent';this.style.color='#a09888'">合盘缘分</a><a href="/fortune" style="display:block;color:#a09888;text-decoration:none;padding:8px 16px;white-space:nowrap;transition:all .2s" onmouseenter="this.style.background='rgba(201,168,76,.06)';this.style.color='#e8cf70'" onmouseleave="this.style.background='transparent';this.style.color='#a09888'">今日运势</a><a href="/meihua" style="display:block;color:#a09888;text-decoration:none;padding:8px 16px;white-space:nowrap;transition:all .2s" onmouseenter="this.style.background='rgba(201,168,76,.06)';this.style.color='#e8cf70'" onmouseleave="this.style.background='transparent';this.style.color='#a09888'">梅花易数</a><a href="/liuyao" style="display:block;color:#a09888;text-decoration:none;padding:8px 16px;white-space:nowrap;transition:all .2s" onmouseenter="this.style.background='rgba(201,168,76,.06)';this.style.color='#e8cf70'" onmouseleave="this.style.background='transparent';this.style.color='#a09888'">六爻占卜</a><a href="/liuren" style="display:block;color:#a09888;text-decoration:none;padding:8px 16px;white-space:nowrap;transition:all .2s" onmouseenter="this.style.background='rgba(201,168,76,.06)';this.style.color='#e8cf70'" onmouseleave="this.style.background='transparent';this.style.color='#a09888'">大六壬</a></div></div><a href="/pricing" style="color:#c9a84c;text-decoration:none;padding:6px 10px;border-radius:6px;border:1px solid rgba(201,168,76,.25);white-space:nowrap">积分</a></div></div>


<div class="fortune-page">
  <div class="fortune-header">
    <div class="brand">知 时</div>
    <div class="sub">今日运势</div>
    <div class="date" id="todayDate"></div>
  </div>
  <div class="chart-select" id="chartSelect" style="display:none">
    <select id="chartPicker" onchange="loadFortune()"></select>
  </div>
  <div id="content"></div>
  <div class="quote">「 知天时 · 见自己 」</div>
</div>

<script src="js/auth.js"></script>
<script>
(function(){
  var todayDate = document.getElementById('todayDate');
  var content = document.getElementById('content');
  var chartSelect = document.getElementById('chartSelect');
  var chartPicker = document.getElementById('chartPicker');
  var today = new Date();
  todayDate.textContent = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';

  // 日柱计算：1900-01-01=甲戌日，用UTC消除时区影响
  var TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  function getDayPillar(params) {
    var p = new URLSearchParams(params);
    var year = parseInt(p.get('year')) || 0, month = parseInt(p.get('month')) || 0, day = parseInt(p.get('day')) || 0;
    var t = new Date(Date.UTC(year, month-1, day, 12, 0, 0));
    var base = new Date(Date.UTC(1900, 0, 1, 12, 0, 0));
    var days = Math.round((t - base) / 86400000);
    var idx = ((10 + days) % 60 + 60) % 60; // 1900-01-01 = index 10 = 甲戌
    return { dayGan: TG[idx % 10], dayZhi: DZ[idx % 12] };
  }

  function render() {
    if (typeof Auth === 'undefined') return setTimeout(render, 300);
    Auth.ready(function() {
      if (!Auth.isLoggedIn()) {
        content.innerHTML = '<div class="empty"><div class="icon">🔐</div><p>登录后可查看专属今日运势</p><button class="btn" onclick="Auth.showModal(\'login\')" style="padding:12px 32px;border-radius:25px;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none;margin-top:16px">登录</button></div>';
        return;
      }
      Auth.getData('saved_charts').then(function(val) {
        var charts = [];
        try { charts = JSON.parse(val || '[]'); } catch(e) {}
        if (charts.length === 0) {
          content.innerHTML = '<div class="empty"><div class="icon">📋</div><p>还没有保存的排盘</p><p style="font-size:11px;color:var(--tx3)">去排盘页面生成你的命盘，即可查看今日运势</p><a href="/paipan" style="display:inline-block;margin-top:12px;padding:10px 28px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border-radius:25px;text-decoration:none;font-size:14px;font-weight:700;letter-spacing:2px">去排盘</a></div>';
          return;
        }
        chartSelect.style.display = '';
        chartPicker.innerHTML = charts.map(function(c, i) { return '<option value="'+i+'">'+c.label+'</option>'; }).join('');
        loadFortune();
      }).catch(function() {
        content.innerHTML = '<div class="empty"><p>加载失败，请刷新重试</p></div>';
      });
    });
  }

  window.loadFortune = function() {
    content.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:16px">正在生成今日运势...</p></div>';
    Auth.getData('saved_charts').then(function(val) {
      var charts = [];
      try { charts = JSON.parse(val || '[]'); } catch(e) {}
      var idx = parseInt(chartPicker.value) || 0;
      var chart = charts[idx];
      var params = chart.params;
      var year = parseInt((params.match(/year=(\d+)/)||[])[1]) || 0;
      var month = parseInt((params.match(/month=(\d+)/)||[])[1]) || 0;
      var day = parseInt((params.match(/day=(\d+)/)||[])[1]) || 0;
      var gender = (params.match(/gender=(\w+)/)||[])[1] || 'male';

      var dp = chart.dayGan ? {dayGan:chart.dayGan,dayZhi:chart.dayZhi} : getDayPillar(params);
      if (!dp.dayGan) { content.innerHTML = '<div class="empty"><p>无法计算日柱</p><a href="/paipan" style="color:var(--gold)">去排盘</a></div>'; return; }

      // 带超时的 fetch
      var controller = new AbortController();
      var timeout = setTimeout(function(){ controller.abort(); }, 30000);
      fetch('/api/fortune', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ year: year, month: month, day: day, dayGan: dp.dayGan, dayZhi: dp.dayZhi, gender: gender, label: chart.label }),
        signal: controller.signal
      }).then(function(r){ clearTimeout(timeout); return r.json(); })
      .then(function(d){
        if (d.error) { content.innerHTML = '<div class="empty"><p>'+d.error+'</p></div>'; return; }
        var h = d.huangli, f = d.fortune;
        var html = '';
        html += '<div class="fortune-card"><div class="section-label">' + h.date + '</div>';
        html += '<div style="text-align:center;margin-bottom:12px"><span style="font-size:28px;font-weight:900;color:var(--gold-l);letter-spacing:4px">' + h.dayGZ + '日</span></div>';
        html += '<div style="text-align:center;font-size:11px;color:var(--tx2);margin-bottom:10px;letter-spacing:1px">';
        html += '<span>' + h.yearGZ + '</span>';
        html += '<span style="color:var(--tx3);margin:0 6px">|</span>';
        html += '<span>' + h.monthGZ + '</span>';
        html += '</div>';
        html += '<div style="font-size:12px;color:var(--tx2);line-height:2"><div><span style="color:var(--tx3)">节气</span> ' + h.term.cur + ' → ' + h.term.next + '（' + h.term.days + '天）</div>';
        html += '<div><span style="color:var(--tx3)">纳音</span> ' + h.nayin + '</div><div><span style="color:var(--tx3)">星宿</span> ' + h.xiu + '</div><div><span style="color:var(--tx3)">建除</span> ' + h.jianchu + '</div><div><span style="color:var(--tx3)">冲煞</span> ' + h.chong + '</div>';
        html += '<div style="font-size:10px;color:var(--tx3);margin-top:4px">' + h.pengzu + '</div></div>';
        // 方向神煞
        if (h.dirGods) {
          html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">';
          ['喜神','财神','福神','阳贵','阴贵'].forEach(function(k){
            var ek={'喜神':'xishen','财神':'caishen','福神':'fushen','阳贵':'yanggui','阴贵':'yingui'};
            var v=h.dirGods[ek[k]]; if(v) html+='<span style="font-size:10px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.1);border-radius:6px;padding:2px 8px;color:var(--tx2)">'+k+' '+v+'</span>';
          });
          html += '</div>';
        }
        html += '<div style="display:flex;gap:12px;margin-top:12px"><div style="flex:1;background:rgba(100,180,120,.04);border:1px solid rgba(100,180,120,.1);border-radius:8px;padding:10px"><div style="font-size:10px;color:#7ec87e;letter-spacing:2px;margin-bottom:4px">宜</div><div style="font-size:12px;color:var(--tx2);line-height:1.8">' + (h.yi.length ? h.yi.join('、') : '—') + '</div></div>';
        html += '<div style="flex:1;background:rgba(200,100,100,.04);border:1px solid rgba(200,100,100,.1);border-radius:8px;padding:10px"><div style="font-size:10px;color:#e07050;letter-spacing:2px;margin-bottom:4px">忌</div><div style="font-size:12px;color:var(--tx2);line-height:1.8">' + (h.ji.length ? h.ji.join('、') : '—') + '</div></div></div></div>';
        if (f && f.tip) { html += '<div class="fortune-card"><div class="section-label">今日提醒</div><div class="overview">' + f.tip + '</div></div>'; }
        content.innerHTML = html;
      }).catch(function(){ content.innerHTML = '<div class="empty"><p>网络错误，请稍后重试</p></div>'; });
    }).catch(function(){ content.innerHTML = '<div class="empty"><p>加载档案失败，请确认已登录并有排盘记录</p></div>'; });
  };

  render();
})();
</script>
</body>
</html>
