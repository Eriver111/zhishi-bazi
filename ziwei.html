<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知时 · 紫微斗数</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.zw-page{max-width:800px;margin:80px auto 40px;padding:0 16px;animation:fadeIn .8s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.zw-title{text-align:center;font-size:24px;color:var(--gold-l);letter-spacing:6px;margin-bottom:6px}
.zw-sub{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:24px;letter-spacing:2px}
.zw-form{max-width:440px;margin:0 auto 24px}
.zw-form .row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.zw-form .field{flex:1;min-width:100px}
.zw-form label{font-size:10px;color:var(--tx3);letter-spacing:2px;display:block;margin-bottom:4px}
.zw-form select,.zw-form input{width:100%;padding:10px;font-size:13px;font-family:inherit;background:rgba(20,20,36,.6);border:1px solid rgba(201,168,76,.15);border-radius:8px;color:var(--tx);outline:none}
.zw-form select:focus{border-color:var(--gold)}
.btn-sub{display:block;margin:16px auto 0;padding:14px 40px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);border:none;border-radius:25px;cursor:pointer;letter-spacing:2px;font-family:inherit}
.zw-chart{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:2px;overflow:hidden}
.zw-palace{background:rgba(13,21,37,.8);padding:10px 6px;text-align:center;min-height:80px;display:flex;flex-direction:column;justify-content:center;border:1px solid rgba(255,255,255,.03)}
.zw-palace .p-name{font-size:10px;color:var(--gold-l);letter-spacing:1px;margin-bottom:4px}
.zw-palace .p-stars{font-size:12px;color:var(--tx);line-height:1.6;font-weight:600}
.zw-palace .p-minor{font-size:9px;color:var(--tx3);line-height:1.4}
.zw-palace .p-ganzhi{font-size:9px;color:var(--tx3);margin-bottom:2px}
.zw-palace .p-hua{font-size:8px;color:#e8a040;margin-top:2px}
.zw-palace.ming{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.15)}
.zw-info{text-align:center;font-size:12px;color:var(--tx2);margin:16px 0;letter-spacing:1px}
.reading{font-size:14px;color:var(--tx);line-height:2.2;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-top:16px}
.loading{text-align:center;padding:40px;color:var(--tx3)}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.zw-chart{grid-template-columns:1fr 1fr 1fr}.zw-palace{min-height:60px;padding:6px 4px}}
</style>
</head>
<body>
<div class="zw-page">
  <div class="zw-title">紫微斗数</div>
  <div class="zw-sub">星曜布列 · 十二宫 · 四化飞星</div>

  <div class="zw-form" id="formArea">
    <div class="row">
      <div class="field"><label>年</label><select id="zwYear"></select></div>
      <div class="field"><label>月</label><select id="zwMonth"></select></div>
      <div class="field"><label>日</label><select id="zwDay"></select></div>
      <div class="field"><label>时</label><select id="zwHour"></select></div>
    </div>
    <div class="row">
      <div class="field"><label>性别</label><select id="zwGender"><option value="male">男</option><option value="female">女</option></select></div>
    </div>
    <button class="btn-sub" onclick="doZiwei()">开始排盘</button>
  </div>

  <div id="result"></div>
</div>

<script src="js/lunar.js"></script>
<script src="js/ziwei-db.js"></script>
<script src="js/ziwei.js"></script>
<script src="js/auth.js"></script>
<script>
(function(){
  var now=new Date();
  function fillSelect(id,from,to,cur){ var s=document.getElementById(id); for(var i=from;i<=to;i++){ var o=document.createElement('option'); o.value=i; o.textContent=i; if(i===cur)o.selected=true; s.appendChild(o); } }
  fillSelect('zwYear',1960,2026,2000);
  fillSelect('zwMonth',1,12,6);
  fillSelect('zwDay',1,31,15);
  var hSel=document.getElementById('zwHour');
  var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  for(var i=0;i<12;i++){ var o=document.createElement('option'); o.value=i; o.textContent=DZ[i]+'时（'+(i*2)+'-'+(i*2+2)+'点）'; if(i===6)o.selected=true; hSel.appendChild(o); }
})();

function doZiwei(){
  var y=parseInt(document.getElementById('zwYear').value);
  var m=parseInt(document.getElementById('zwMonth').value);
  var d=parseInt(document.getElementById('zwDay').value);
  var h=parseInt(document.getElementById('zwHour').value);
  var isMale=document.getElementById('zwGender').value==='male';
  var res=document.getElementById('result');

  try{ var zw=ZIWEI_CALC.calcZiwei(y,m,d,h,isMale); }catch(e){ res.innerHTML='<div class="loading">排盘失败：'+e.message+'</div>'; return; }

  var chart=zw.chart, order=['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
  var html='<div class="zw-info">命宫：<b style="color:var(--gold-l)">'+zw.mingGong+'</b> | '+zw.wuxingJu+'</div><div class="zw-chart">';
  order.forEach(function(name){
    var p=chart[name]; var huaHTML='';
    if(p.hua.length) huaHTML='<div class="p-hua">'+p.hua.map(function(h){ var lb={'lu':'禄','quan':'权','ke':'科','ji':'忌'}; return lb[h]||h; }).join(' ')+'</div>';
    html+='<div class="zw-palace'+(name==='命宫'?' ming':'')+'"><div class="p-name">'+name+'</div><div class="p-ganzhi">'+p.ganZhi+'</div><div class="p-stars">'+(p.stars.length?p.stars.join(' ') : '—')+'</div><div class="p-minor">'+(p.minors.length?p.minors.join(' '):'')+'</div>'+huaHTML+'</div>';
  });
  html+='</div>';
  html+='<button class="btn-sub" onclick="doAIReading()" style="margin-top:16px">积分解锁 AI 解读</button>';
  html+='<p style="text-align:center;font-size:11px;color:var(--tx3);margin-top:8px">排盘免费 · AI解读消耗1次积分</p>';
  res.innerHTML=html;
  res._zw=zw; res._chart=chart;
}

window.doAIReading=function(){
  var res=document.getElementById('result'); if(!res._zw) return;
  if(typeof Auth==='undefined'||!Auth.isLoggedIn()){ Auth.showModal('login'); return; }
  res.innerHTML=res.innerHTML.replace(/<button.*?btn-sub.*?<\/button>/,'').replace(/<p.*?排盘免费.*?<\/p>/,'');
  res.innerHTML+='<div class="loading"><div class="spinner"></div><p>正在AI解读...</p></div>';

  var zw=res._zw;
  var prompt='你是"知时先生"，精通紫微斗数。请根据以下命盘，用300字左右做专业解读。命主命宫在'+zw.mingGong+'，五行局为'+zw.wuxingJu+'，十二宫详情如下：\n';
  var order=['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
  order.forEach(function(name){
    var p=res._chart[name];
    prompt+=name+'('+p.ganZhi+'): '+(p.stars.length?p.stars.join('、'):'无主星')+(p.minors.length?'，辅星:'+p.minors.join('、'):'')+(p.hua.length?'，四化:'+p.hua.join(','):'')+'；';
  });
  prompt+='\n请分析：1.命宫格局 2.事业财运 3.感情婚姻 4.整体建议。语气专业但不玄乎。返回JSON：{"reading":"完整解读"}';

  fetch('/api/divination',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
  .then(function(r){return r.json()}).then(function(d){
    var tip=d.reading||'解读生成中';
    res.innerHTML=res.innerHTML.replace(/<div class="loading">.*?<\/div>/,'')+'<div class="reading">'+tip.replace(/\n/g,'<br>')+'</div>';
  }).catch(function(){ res.innerHTML+='<div class="reading" style="text-align:center;color:var(--tx3)">解读暂不可用</div>'; });
};
</script>
</body>
</html>
